server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS (127.0.0.11) so nginx re-resolves the `api`
    # container at request time. Without this, nginx caches the upstream IP
    # at boot and never refreshes — when the api container restarts and gets
    # a new internal IP, every proxy attempt fails 502 until nginx restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets — long cache, immutable hash names
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PWA service worker should never be cached
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # API proxy. Assigning the upstream to a variable forces nginx to use the
    # resolver above instead of the boot-time cached IP.
    location /v1/ {
        set $api_upstream "http://api:3001";
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every other path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
