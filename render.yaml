services:
  - type: web
    name: ms-api-staging
    env: node
    region: frankfurt
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ms/db migrate && pnpm build
    startCommand: pnpm --filter @ms/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ms-postgres-staging
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ms-redis-staging
          type: redis
          property: connectionString
      - key: JWT_SIGNING_KEY
        sync: false
      - key: PUBLIC_API_URL
        value: https://ms-api-staging.onrender.com
      - key: PUBLIC_ADMIN_URL
        value: https://ms-admin-staging.onrender.com

  - type: worker
    name: ms-worker-staging
    env: node
    region: frankfurt
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @ms/worker start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          name: ms-redis-staging
          type: redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: ms-postgres-staging
          property: connectionString

  - type: web
    name: ms-admin-staging
    env: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ms/admin build
    staticPublishPath: apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: ms-redis-staging
    region: frankfurt
    plan: starter
    ipAllowList: []

databases:
  - name: ms-postgres-staging
    plan: starter
    region: frankfurt
