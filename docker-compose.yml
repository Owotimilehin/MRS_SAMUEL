services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ms
      POSTGRES_PASSWORD: ms
      POSTGRES_DB: ms_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ms -d ms_dev"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  pgdata:
