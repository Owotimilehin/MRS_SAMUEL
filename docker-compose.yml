# One compose file for dev AND prod. Dev uses the defaults; prod overrides via
# .env on the host (see DEPLOY.md). HOST_BIND defaults to 0.0.0.0 so devs can
# hit localhost:3001 from a browser. In prod, set HOST_BIND=127.0.0.1 so only
# Cloudflare Tunnel (running on the host) can reach the published ports.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ms}
      POSTGRES_DB: ${POSTGRES_DB:-ms_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ms} -d ${POSTGRES_DB:-ms_dev}"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  migrator:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://ms:ms@postgres:5432/ms_dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://ms:ms@postgres:5432/ms_dev}
      DATABASE_URL_REPLICA: ${DATABASE_URL:-postgres://ms:ms@postgres:5432/ms_dev}
      REDIS_URL: redis://redis:6379
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-jwt-key-padding-padding-padding-XXX}
      SESSION_COOKIE_NAME: ms_session
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3001}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL:-http://localhost:3010}
      PUBLIC_CUSTOMER_URL: ${PUBLIC_CUSTOMER_URL:-http://localhost:3002}
      PORT: "3001"
      RATE_LIMIT_DISABLED: "0"
      # Set to "1" in .env when serving on plain HTTP (raw-IP demo). Forces
      # session cookies to drop the Secure flag so the browser actually sends
      # them back. Production behind Cloudflare Tunnel = HTTPS, leave unset.
      COOKIE_INSECURE: ${COOKIE_INSECURE:-0}
      # Payments — Payaza collection. Empty PAYAZA_PUBLIC_KEY = mock mode.
      # Payaza does not sign its callbacks (no webhook secret) — the webhook is a
      # wake-up and payment is re-verified server-to-server by order reference.
      PAYAZA_SECRET_KEY: ${PAYAZA_SECRET_KEY:-}
      PAYAZA_PUBLIC_KEY: ${PAYAZA_PUBLIC_KEY:-}
      PAYAZA_API_BASE: ${PAYAZA_API_BASE:-}
      PAYAZA_AUTH_SCHEME: ${PAYAZA_AUTH_SCHEME:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      # Delivery — Shipbubble (active) or Bolt (legacy mock fallback).
      DELIVERY_PROVIDER: ${DELIVERY_PROVIDER:-bolt}
      SHIPBUBBLE_PROVIDER: ${SHIPBUBBLE_PROVIDER:-mock}
      SHIPBUBBLE_API_KEY: ${SHIPBUBBLE_API_KEY:-}
      SHIPBUBBLE_API_BASE: ${SHIPBUBBLE_API_BASE:-}
      SHIPBUBBLE_WEBHOOK_SECRET: ${SHIPBUBBLE_WEBHOOK_SECRET:-}
      SHIPBUBBLE_SENDER_NAME: ${SHIPBUBBLE_SENDER_NAME:-}
      SHIPBUBBLE_SENDER_PHONE: ${SHIPBUBBLE_SENDER_PHONE:-}
      SHIPBUBBLE_SENDER_EMAIL: ${SHIPBUBBLE_SENDER_EMAIL:-}
      SHIPBUBBLE_SENDER_ADDRESS: ${SHIPBUBBLE_SENDER_ADDRESS:-}
      SHIPBUBBLE_CATEGORY_ID: ${SHIPBUBBLE_CATEGORY_ID:-}
      SHIPBUBBLE_PKG_WEIGHT_KG: ${SHIPBUBBLE_PKG_WEIGHT_KG:-}
      SHIPBUBBLE_PKG_VALUE_NGN: ${SHIPBUBBLE_PKG_VALUE_NGN:-}
      SHIPBUBBLE_PKG_LENGTH_CM: ${SHIPBUBBLE_PKG_LENGTH_CM:-}
      SHIPBUBBLE_PKG_WIDTH_CM: ${SHIPBUBBLE_PKG_WIDTH_CM:-}
      SHIPBUBBLE_PKG_HEIGHT_CM: ${SHIPBUBBLE_PKG_HEIGHT_CM:-}
      BOLT_PROVIDER: ${BOLT_PROVIDER:-mock}
      BOLT_API_KEY: ${BOLT_API_KEY:-}
      BOLT_WEBHOOK_SECRET: ${BOLT_WEBHOOK_SECRET:-}
      # Image uploads (Cloudflare R2). Empty = uploads disabled.
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      # Instagram feed (optional).
      IG_ACCESS_TOKEN: ${IG_ACCESS_TOKEN:-}
      IG_BUSINESS_ACCOUNT_ID: ${IG_BUSINESS_ACCOUNT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${HOST_BIND:-0.0.0.0}:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgres://ms:ms@postgres:5432/ms_dev}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL:-http://localhost:3010}
      PUBLIC_CUSTOMER_URL: ${PUBLIC_CUSTOMER_URL:-http://localhost:3002}
      # Delivery dispatch + watchdog (worker drives Shipbubble/Bolt label + tracking).
      DELIVERY_PROVIDER: ${DELIVERY_PROVIDER:-bolt}
      DELIVERY_WATCHDOG_MS: ${DELIVERY_WATCHDOG_MS:-}
      SHIPBUBBLE_PROVIDER: ${SHIPBUBBLE_PROVIDER:-mock}
      SHIPBUBBLE_API_KEY: ${SHIPBUBBLE_API_KEY:-}
      SHIPBUBBLE_API_BASE: ${SHIPBUBBLE_API_BASE:-}
      SHIPBUBBLE_WEBHOOK_SECRET: ${SHIPBUBBLE_WEBHOOK_SECRET:-}
      BOLT_PROVIDER: ${BOLT_PROVIDER:-mock}
      BOLT_API_KEY: ${BOLT_API_KEY:-}
      BOLT_WEBHOOK_SECRET: ${BOLT_WEBHOOK_SECRET:-}
      BOLT_MOCK_WEBHOOK_URL: ${BOLT_MOCK_WEBHOOK_URL:-}
      # Refunds + recurring charges — Payaza. Empty = mock refund reference.
      # PAYAZA_PUBLIC_KEY is needed by the recurring charge-authorization call.
      PAYAZA_SECRET_KEY: ${PAYAZA_SECRET_KEY:-}
      PAYAZA_PUBLIC_KEY: ${PAYAZA_PUBLIC_KEY:-}
      PAYAZA_API_BASE: ${PAYAZA_API_BASE:-}
      PAYAZA_AUTH_SCHEME: ${PAYAZA_AUTH_SCHEME:-}
      # Image processing (Cloudflare R2).
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_OWNER_CHANNEL_ID: ${TELEGRAM_OWNER_CHANNEL_ID:-}
      TELEGRAM_FACTORY_CHANNEL_ID: ${TELEGRAM_FACTORY_CHANNEL_ID:-}
      TELEGRAM_BRANCH_AJAO_CHANNEL_ID: ${TELEGRAM_BRANCH_AJAO_CHANNEL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "${HOST_BIND:-0.0.0.0}:3010:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  customer:
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      HOST: "0.0.0.0"
      # Used by the SSR app's server functions to reach the API. This is the
      # in-network service address and is deliberately NOT derived from the
      # host's PUBLIC_API_URL: that var is overloaded (the api service uses it
      # for outbound Payaza callback URLs, which must be the *public* host URL).
      # The customer container always reaches the api over the compose network,
      # where it is `http://api:3001` in both dev and prod.
      PUBLIC_API_URL: http://api:3001
    ports:
      - "${HOST_BIND:-0.0.0.0}:3002:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
