name: CI
on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ms
          POSTGRES_PASSWORD: ms
          POSTGRES_DB: ms_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Run migrations
        env:
          DATABASE_URL: postgres://ms:ms@localhost:5432/ms_dev
        run: pnpm --filter @ms/db migrate
      - name: Test
        env:
          DATABASE_URL: postgres://ms:ms@localhost:5432/ms_dev
          REDIS_URL: redis://localhost:6379
          JWT_SIGNING_KEY: test-key-not-for-production-XXXXXXXXXXXXXX
          PUBLIC_API_URL: http://localhost:3001
          PUBLIC_ADMIN_URL: http://localhost:3000
        run: pnpm test
      - name: Build
        run: pnpm build
