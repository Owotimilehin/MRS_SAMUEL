name: deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + pull + rebuild on droplet
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -i ~/.ssh/deploy "$USER@$HOST" bash -se <<'EOF'
            set -euo pipefail
            cd /opt/mrs-samuel
            echo "==> Pull"
            git fetch --quiet origin master
            git reset --hard origin/master
            echo "==> Build + up (migrator runs automatically)"
            docker compose up -d --build --remove-orphans
            echo "==> Pruning dangling images"
            docker image prune -f >/dev/null
            echo "==> Health"
            sleep 8
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost:3001/v1/health >/dev/null; then
                echo "API healthy"
                exit 0
              fi
              sleep 5
            done
            echo "API not healthy after 30s — recent logs:"
            docker compose logs --tail=80 api
            exit 1
          EOF
